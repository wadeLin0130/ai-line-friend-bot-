version: '3.8'

services:
  bot:
    build: .
    container_name: ai_line_bot
    ports:
      - "8000:8000"
    volumes:
      - ./.env:/app/.env                 # 掛載環境變數（請自行建立）
      - ./config.yaml:/app/config.yaml   # 掛載設定檔
      - ./affinity.json:/app/affinity.json # 持久化好感度資料
      # - ./memory_db.json:/app/memory_db.json  # 如需持久化記憶可取消註解
    restart: always